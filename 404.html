<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Hugo Barbearia</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .error-box { max-width: 480px; }
    .error-code { font-size: 8rem; font-weight: 800; color: var(--accent); font-family: 'Playfair Display', serif; line-height: 1; }
    .error-msg { font-size: 1.3rem; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-box">
      <div class="error-code">404</div>
      <div class="error-msg">Página não encontrada</div>
      <p class="text-muted mb-4">A página que você procura não existe ou foi movida.</p>
      <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Voltar ao início</a>
    </div>
  </div>
</body>
</html>
