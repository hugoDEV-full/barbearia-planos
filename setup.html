<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Barbearia — Barbearia Planos</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-box" style="max-width:560px;">
    <div class="auth-logo">
      <div class="sidebar-brand-icon" style="margin:0 auto 12px;width:50px;height:50px;font-size:1.5rem;"><i class="fas fa-store"></i></div>
      <h1>Criar sua Barbearia</h1>
      <p>Configure tudo em poucos passos</p>
    </div>
    <div class="auth-card">
      <form id="setupForm">
        <h3 style="margin-bottom:16px;font-size:1rem;color:var(--accent);"><i class="fas fa-store"></i> Dados da Barbearia</h3>
        <div class="form-group">
          <label>Nome da Barbearia *</label>
          <input type="text" id="nome" placeholder="Ex: Barbearia Vintage" required data-tooltip="Nome público da sua barbearia">
        </div>
        <div class="form-group">
          <label>Slug (URL amigável) *</label>
          <input type="text" id="slug" placeholder="vintage" required data-tooltip="Identificador único para a URL">
          <small class="text-muted">Seu site: barbearia-planos.netlify.app/barbearia.html?slug=<span id="slugPreview">vintage</span></small>
        </div>
        <div class="form-group">
          <label>Slogan</label>
          <input type="text" id="slogan" placeholder="Ex: Estilo clássico, atitude moderna" data-tooltip="Frase de impacto da barbearia">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="descricao" rows="2" placeholder="Breve descrição da sua barbearia" data-tooltip="Descrição exibida no site público"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="telefone" placeholder="(11) 99999-9999" data-tooltip="Telefone de contato">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailBarb" placeholder="contato@barbearia.com" data-tooltip="Email de contato">
          </div>
        </div>
        <div class="form-group">
          <label>Endereço</label>
          <input type="text" id="endereco" placeholder="Rua, número, bairro" data-tooltip="Endereço físico">
        </div>

        <hr style="border-color:var(--border);margin:24px 0;">

        <h3 style="margin-bottom:16px;font-size:1rem;color:var(--accent);"><i class="fas fa-user-shield"></i> Dados do Administrador</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="adminNome" placeholder="Seu nome" required data-tooltip="Nome do administrador">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="adminEmail" placeholder="seu@email.com" required data-tooltip="Email de acesso ao painel">
          </div>
        </div>
        <div class="form-group">
          <label>Senha *</label>
          <input type="password" id="adminSenha" placeholder="Mínimo 6 caracteres" required data-tooltip="Crie uma senha segura">
        </div>

        <button type="submit" class="btn btn-primary w-full" data-tooltip="Criar barbearia e acessar painel"><i class="fas fa-rocket"></i> Criar Barbearia</button>
      </form>
    </div>
    <div class="auth-footer">
      Já tem uma conta? <a href="login.html" data-tooltip="Ir para o login">Entrar</a>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    DB.seed();
    document.getElementById('slug').addEventListener('input', e => {
      document.getElementById('slugPreview').textContent = e.target.value || 'vintage';
    });
    document.getElementById('setupForm').addEventListener('submit', e => {
      e.preventDefault();
      const slug = document.getElementById('slug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
      if (DB.getBarbeariaBySlug(slug)) { alert('Este slug já está em uso. Escolha outro.'); return; }

      const barbearia = DB.saveBarbearia({
        nome: document.getElementById('nome').value.trim(),
        slug,
        slogan: document.getElementById('slogan').value.trim(),
        descricao: document.getElementById('descricao').value.trim(),
        telefone: document.getElementById('telefone').value.trim(),
        email: document.getElementById('emailBarb').value.trim(),
        endereco: document.getElementById('endereco').value.trim(),
        corPrimaria: '#d4a853',
        instagram: '',
        logo: '',
        horarioFuncionamento: { seg: '09:00-18:00', ter: '09:00-18:00', qua: '09:00-18:00', qui: '09:00-18:00', sex: '09:00-20:00', sab: '09:00-14:00', dom: 'fechado' }
      });

      const user = DB.saveUser({
        barbeariaId: barbearia.id,
        nome: document.getElementById('adminNome').value.trim(),
        email: document.getElementById('adminEmail').value.trim(),
        senha: document.getElementById('adminSenha').value,
        telefone: '',
        tipo: 'admin',
        avatar: ''
      });

      DB.setSession({ userId: user.id, tipo: user.tipo, barbeariaId: barbearia.id });
      alert('Barbearia criada com sucesso!');
      window.location.href = 'admin.html';
    });
  </script>
</body>
</html>
