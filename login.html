<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Barbearia Vintage</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="sidebar-brand-icon" style="margin:0 auto 12px;width:50px;height:50px;font-size:1.5rem;"><i class="fas fa-cut"></i></div>
      <h1>Barbearia Vintage</h1>
      <p>Acesse sua conta</p>
    </div>
    <div class="auth-card">
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full"><i class="fas fa-sign-in-alt"></i> Entrar</button>
      </form>
      <div style="margin-top:16px;text-align:center;">
        <small class="text-muted">Admin: hugo.leonardo.jobs@gmail.com / admin123</small><br>
        <small class="text-muted">Cliente demo: andre@email.com / 123456</small><br>
        <a href="recuperar-senha.html" style="font-size:0.8rem;">Esqueceu a senha?</a>
      </div>
    </div>
    <div class="auth-footer">
      <a href="index.html">Voltar ao site</a>
      <span style="color:var(--text-muted);">|</span>
      <a href="material-publicitario.html">Conheça o Sistema</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const senha = document.getElementById('senha').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Email ou senha incorretos.'); return; }
        DB.setSession({ userId: data.user.id, tipo: data.user.tipo, barbeariaId: data.user.barbearia_id, token: data.token });
        await DB.sync(data.user.barbearia_id);
        window.location.href = data.user.tipo === 'admin' ? 'portal-admin.html' : 'cliente.html';
      } catch (err) {
        alert('Erro de conexão com o servidor. Verifique se o backend está rodando.');
      }
    });
  </script>
</body>
</html>
