<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação — Hugo Barbearia</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .confirm-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .confirm-box { max-width: 480px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 36px; }
    .confirm-icon { font-size: 4rem; color: var(--success); margin-bottom: 20px; }
    .confirm-box h1 { font-size: 1.8rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="confirm-page">
    <div class="confirm-box">
      <div class="confirm-icon"><i class="fas fa-check-circle"></i></div>
      <h1 id="titulo">Tudo certo!</h1>
      <p class="text-muted" id="mensagem">Seu agendamento foi confirmado.</p>
      <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Voltar ao início</a>
        <a href="login.html" class="btn btn-secondary"><i class="fas fa-user"></i> Área do Cliente</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo');
    const status = params.get('status');
    if (tipo === 'plano') {
      if (status === 'aprovado') {
        document.getElementById('titulo').textContent = 'Pagamento Aprovado!';
        document.getElementById('mensagem').textContent = 'Sua assinatura está ativa. Acesse a área do cliente para gerenciar seus benefícios.';
        document.querySelector('.confirm-icon').innerHTML = '<i class="fas fa-check-circle"></i>';
        document.querySelector('.confirm-icon').style.color = 'var(--success)';
      } else if (status === 'rejeitado' || window.location.search.includes('erro=1')) {
        document.getElementById('titulo').textContent = 'Pagamento Não Aprovado';
        document.getElementById('mensagem').textContent = 'Houve um problema com seu pagamento. Tente novamente ou escolha outra forma de pagamento.';
        document.querySelector('.confirm-icon').innerHTML = '<i class="fas fa-times-circle"></i>';
        document.querySelector('.confirm-icon').style.color = 'var(--danger)';
      } else if (window.location.search.includes('pendente=1')) {
        document.getElementById('titulo').textContent = 'Pagamento Pendente';
        document.getElementById('mensagem').textContent = 'Seu pagamento está sendo processado. Assim que for confirmado, sua assinatura será ativada automaticamente.';
        document.querySelector('.confirm-icon').innerHTML = '<i class="fas fa-clock"></i>';
        document.querySelector('.confirm-icon').style.color = 'var(--warning)';
      } else {
        document.getElementById('titulo').textContent = 'Assinatura confirmada!';
        document.getElementById('mensagem').textContent = 'Em breve entraremos em contato pelo WhatsApp para ativar seu plano.';
      }
    } else if (tipo === 'contato') {
      document.getElementById('titulo').textContent = 'Mensagem enviada!';
      document.getElementById('mensagem').textContent = 'Responderemos em breve pelo email ou WhatsApp.';
    } else {
      document.getElementById('titulo').textContent = 'Agendamento confirmado!';
      document.getElementById('mensagem').textContent = 'Guarde sua data e horário. Te esperamos na Hugo Barbearia!';
    }
  </script>
</body>
</html>
