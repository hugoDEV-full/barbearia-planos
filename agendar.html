<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Horário — Hugo Barbearia</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .page-header { background: linear-gradient(rgba(10,10,15,0.8), rgba(10,10,15,0.95)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=1400&q=80') center/cover; padding: 80px 40px; text-align: center; }
    .page-header h1 { font-size: 2.4rem; }
    .agendar-box-page { max-width: 560px; margin: 40px auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; }
    .horarios-dispo { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-top: 8px; }
    .hora-tag { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; text-align: center; font-size: 0.8rem; cursor: pointer; transition: var(--transition); }
    .hora-tag:hover, .hora-tag.selected { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
    .hora-tag.ocupado { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
  </style>
</head>
<body>
  <nav class="public-header">
    <div class="public-logo">
      <div class="sidebar-brand-icon"><i class="fas fa-cut"></i></div>
      <div><div class="sidebar-brand-text">Hugo Barbearia</div></div>
    </div>
    <div class="public-nav">
      <a href="index.html">Início</a>
      <a href="servicos.html">Serviços</a>
      <a href="planos.html">Planos</a>
      <a href="contato.html">Contato</a>
      <a href="login.html">Área do Cliente</a>
    </div>
  </nav>

  <section class="page-header">
    <h1>Agendar Horário</h1>
    <p class="text-muted">Escolha o dia, horário e serviço desejado.</p>
  </section>

  <div class="agendar-box-page">
    <form id="formAgendar">
      <div class="form-group"><label>Nome completo</label><input type="text" id="nome" required placeholder="Seu nome"></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="seu@email.com"></div>
      <div class="form-group"><label>Telefone</label><input type="text" id="tel" placeholder="(61) 99999-9999"></div>
      <div class="form-group"><label>Data</label><input type="date" id="data" required></div>
      <div class="form-group">
        <label>Horários disponíveis</label>
        <div class="horarios-dispo" id="horarios"></div>
        <input type="hidden" id="horaSelecionada">
      </div>
      <div class="form-group"><label>Serviço</label><select id="servico" required></select></div>
      <div class="form-group"><label>Barbeiro (opcional)</label><select id="barbeiro"><option value="">Qualquer</option></select></div>
      <div class="form-group"><label>Observações</label><textarea id="obs" rows="2" placeholder="Alguma preferência?"></textarea></div>
      <button type="submit" class="btn btn-primary w-full"><i class="fas fa-calendar-check"></i> Confirmar Agendamento</button>
    </form>
  </div>

  <footer class="landing-footer">
    <p>Hugo Barbearia — Brasília - DF</p>
    <p class="mt-4 text-muted">WhatsApp: (61) 98297-6481 | hugo.leonardo.jobs@gmail.com</p>
  </footer>

  <script src="js/storage.js"></script>
  <script>
    DB.seed();
    const barbearia = DB.getBarbearias()[0];
    const servicos = DB.getServicos(barbearia.id);
    const colabs = DB.getColaboradores(barbearia.id);
    const ags = DB.getAgendamentos(barbearia.id);

    const selS = document.getElementById('servico');
    servicos.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.nome + ' — R$ ' + (parseFloat(s.preco)||0).toFixed(2).replace('.',','); selS.appendChild(o); });
    const selB = document.getElementById('barbeiro');
    colabs.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.nome; selB.appendChild(o); });

    const dataInput = document.getElementById('data');
    dataInput.min = new Date().toISOString().split('T')[0];

    const horariosEl = document.getElementById('horarios');
    const horaInput = document.getElementById('horaSelecionada');
    const horas = ['09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];

    function renderHoras() {
      const d = dataInput.value;
      const ocupados = ags.filter(a => a.data === d).map(a => a.horario);
      horariosEl.innerHTML = horas.map(h => {
        const ocu = ocupados.includes(h);
        return `<div class="hora-tag ${ocu?'ocupado':''}" data-hora="${h}">${h}</div>`;
      }).join('');
      horariosEl.querySelectorAll('.hora-tag:not(.ocupado)').forEach(el => {
        el.addEventListener('click', () => {
          horariosEl.querySelectorAll('.hora-tag').forEach(t => t.classList.remove('selected'));
          el.classList.add('selected');
          horaInput.value = el.dataset.hora;
        });
      });
    }
    dataInput.addEventListener('change', renderHoras);
    renderHoras();

    document.getElementById('formAgendar').addEventListener('submit', e => {
      e.preventDefault();
      if (!horaInput.value) { alert('Selecione um horário.'); return; }
      let cliente = DB.getUsers().find(u => u.email === document.getElementById('email').value.trim() && u.barbeariaId === barbearia.id);
      if (!cliente) {
        cliente = DB.saveUser({ barbeariaId: barbearia.id, nome: document.getElementById('nome').value.trim(), email: document.getElementById('email').value.trim(), telefone: document.getElementById('tel').value.trim(), tipo: 'cliente', senha: '123456', avatar: '' });
      }
      DB.saveAgendamento({ barbeariaId: barbearia.id, clienteId: cliente.id, data: dataInput.value, horario: horaInput.value, servicoId: document.getElementById('servico').value, colaboradorId: document.getElementById('barbeiro').value || null, status: 'agendado', obs: document.getElementById('obs').value.trim() });
      window.location.href = 'confirmacao.html?tipo=agendamento';
    });
  </script>
</body>
</html>
