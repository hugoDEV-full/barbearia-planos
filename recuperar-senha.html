<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha — Hugo Barbearia</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="sidebar-brand-icon" style="margin:0 auto 12px;width:50px;height:50px;font-size:1.5rem;"><i class="fas fa-cut"></i></div>
      <h1>Hugo Barbearia</h1>
      <p>Recuperar senha</p>
    </div>
    <div class="auth-card">
      <form id="recForm">
        <div class="form-group">
          <label>Email cadastrado</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-full"><i class="fas fa-paper-plane"></i> Enviar link de recuperação</button>
      </form>
      <div style="margin-top:16px;text-align:center;">
        <small class="text-muted">Simulação: nenhum email será enviado.</small>
      </div>
    </div>
    <div class="auth-footer">
      <a href="login.html">Voltar ao login</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    DB.seed();
    document.getElementById('recForm').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const user = DB.getUsers().find(u => u.email === email);
      if (!user) { alert('Email não encontrado.'); return; }
      alert('Link de recuperação enviado para ' + email + ' (simulado).');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
